project:
  name: RIS_SIONNA
  description: "Channel charting — Ashby scene, MIMO, dissimilarity MDS"

runtime:
  prefer_gpu: true
  force_cpu: false
  tensorflow_import: auto
  disable_pythreejs: true
  mitsuba_variant: auto

simulation:
  frequency_hz: 28.0e9
  max_depth: 4
  max_num_paths_per_src: 200000
  samples_per_src: 200000
  los: true
  specular_reflection: true
  diffuse_reflection: true       # more multipath = richer CSI variation
  refraction: false
  diffraction: false

scene:
  type: file
  file: scenes/ashby/scene.xml
  export_mesh: true
  tx:
    name: tx
    position: [-101.3, 133.5, 12.0]   # elevated TX (base-station height)
    look_at: [-60.0, 30.0, 1.5]
    power_dbm: 44.0
  rx:
    name: rx
    position: [-120.0, 22.0, 1.5]
  arrays:
    tx:
      num_rows: 4
      num_cols: 4
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
    rx:
      num_rows: 4
      num_cols: 4
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V

radio_map:
  enabled: false

render:
  enabled: false

channel_charting:
  enabled: true
  role: downlink
  trajectory:
    type: waypoints
    num_steps: 250          # denser sampling along the route
    dt_s: 0.1
    waypoints:              # your Ashby route (will be overridden by UI)
      - [-106.6, 156.2, 1.5]
      - [-105.0, 134.7, 1.5]
      - [-98.1, 112.9, 1.5]
      - [-89.7, 80.6, 1.5]
      - [-76.8, 54.8, 1.5]
      - [-51.1, 56.0, 1.5]
      - [-29.5, 51.8, 1.5]
      - [-17.9, 78.8, 1.5]
      - [10.6, 86.2, 1.5]
      - [34.6, 89.7, 1.5]
      - [54.4, 74.3, 1.5]
      - [79.6, 67.1, 1.5]
      - [100.4, 60.2, 1.5]
      - [117.9, 48.1, 1.5]
      - [104.4, 7.6, 1.5]
      - [90.3, -17.0, 1.5]
      - [84.8, -55.4, 1.5]
      - [69.5, -89.9, 1.5]
      - [54.2, -144.3, 1.5]
  csi:
    type: cfr
    ofdm:
      num_subcarriers: 128      # 2x more frequency resolution
      subcarrier_spacing_hz: 120e3
  features:
    type: r2m
    window: 5                   # wider temporal averaging
    r2m:
      beamspace: true           # angular features (meaningful with 4x4)
      mode: diag
  model:
    type: dissimilarity_mds     # distance-preserving — no collapse possible
  dissimilarity:
    metric: adp_cosine
    max_taps: 32                # limit delay taps to reduce noise
    temporal_smooth_bandwidth: 3  # Gaussian smooth dissimilarity matrix
    fuse_time: true
    time_window_s: 3.0          # longer temporal context
    time_weight: 0.6            # stronger temporal regularisation (was 0.35)
    use_geodesic: true
    knn: 25                     # smoother geodesic paths (was 10)
    dims: 2
  tracking:
    enabled: true
    method: multi               # bidirectional EMA + Savitzky-Golay polish
    alpha: 0.10                 # aggressive smoothing
    savgol_window: 21           # polynomial window for Savgol pass
    savgol_polyorder: 3
  evaluation:
    align: procrustes           # more robust than affine (was affine)
    dims: 2

output:
  base_dir: outputs
