project:
  name: RIS_SIONNA
  description: "Channel charting wideband MIMO"

runtime:
  prefer_gpu: true
  force_cpu: false
  tensorflow_import: auto
  disable_pythreejs: true
  mitsuba_variant: auto

simulation:
  frequency_hz: 28.0e9
  max_depth: 4
  max_num_paths_per_src: 200000
  samples_per_src: 200000
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: false
  diffraction: false

scene:
  type: builtin
  builtin: simple_street_canyon
  export_mesh: true
  tx:
    name: tx
    position: [-60.0, -5.0, 12.0]
    look_at: [0.0, 0.0, 1.5]
    power_dbm: 30.0
  rx:
    name: rx
    position: [60.0, 5.0, 1.5]
  arrays:
    tx:
      num_rows: 4
      num_cols: 4
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
    rx:
      num_rows: 4
      num_cols: 4
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V

radio_map:
  enabled: false

render:
  enabled: false

channel_charting:
  enabled: true
  role: downlink
  trajectory:
    type: waypoints
    waypoints:
      - [-50.0, -2.0, 1.5]
      - [-10.0, 4.0, 1.5]
      - [30.0, -6.0, 1.5]
      - [70.0, 5.0, 1.5]
    num_steps: 140
    dt_s: 0.1
  csi:
    type: cfr
    ofdm:
      num_subcarriers: 128
      subcarrier_spacing_hz: 120e3
  features:
    type: r2m
    window: 5
    r2m:
      beamspace: true
      mode: diag
  model:
    type: autoencoder
    embedding_dim: 3
    hidden_dims: [256, 128]
    epochs: 250
    learning_rate: 5e-4
    adjacency_weight: 0.3
    normalize_features: true
  tracking:
    enabled: true
    method: ema
    alpha: 0.2
  evaluation:
    align: affine
    dims: 3

output:
  base_dir: outputs
