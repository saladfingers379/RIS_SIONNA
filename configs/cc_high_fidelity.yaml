project:
  name: RIS_SIONNA
  description: "Channel charting high fidelity (slow)"

runtime:
  prefer_gpu: true
  force_cpu: false
  tensorflow_import: auto
  disable_pythreejs: true
  mitsuba_variant: auto

simulation:
  frequency_hz: 28.0e9
  max_depth: 5
  max_num_paths_per_src: 800000
  samples_per_src: 800000
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: false
  diffraction: false

scene:
  type: builtin
  builtin: etoile
  export_mesh: true
  tx:
    name: tx
    position: [-30.0, -20.0, 28.0]
    look_at: [40.0, 35.0, 1.5]
    power_dbm: 44.0
  rx:
    name: rx
    position: [70.0, 55.0, 1.5]
  arrays:
    tx:
      num_rows: 8
      num_cols: 8
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
    rx:
      num_rows: 8
      num_cols: 8
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V

radio_map:
  enabled: false

render:
  enabled: false

channel_charting:
  enabled: true
  role: downlink
  trajectory:
    type: straight
    start: [-20.0, -10.0, 1.5]
    end: [80.0, 60.0, 1.5]
    num_steps: 220
    dt_s: 0.1
  csi:
    type: cfr
    ofdm:
      num_subcarriers: 256
      subcarrier_spacing_hz: 60e3
  features:
    type: r2m
    window: 7
    r2m:
      beamspace: true
      mode: diag
  model:
    type: autoencoder
    embedding_dim: 3
    hidden_dims: [512, 256, 128]
    epochs: 400
    learning_rate: 3e-4
    adjacency_weight: 0.35
    normalize_features: true
  tracking:
    enabled: true
    method: ema
    alpha: 0.15
  evaluation:
    align: affine
    dims: 3

output:
  base_dir: outputs
