project:
  name: RIS_SIONNA
  description: "28 GHz indoor anechoic chamber (high fidelity)"

runtime:
  prefer_gpu: true
  force_cpu: false
  require_cuda: true
  tensorflow_import: auto  # auto | force | skip
  disable_pythreejs: true
  mitsuba_variant: auto  # auto | cuda_ad_rgb | llvm_ad_mono_polarized | llvm_ad_spectral_polarized | llvm_ad_rgb | scalar_spectral | scalar_rgb
  vram_guard:
    threshold_mb: 9000
    scale: 0.5

simulation:
  frequency_hz: 28.0e9
  max_depth: 6
  max_num_paths_per_src: 2000000
  samples_per_src: 2000000
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: false
  diffraction: false
  scale_similarity:
    enabled: false
    factor: 1.0
  sampling_boost:
    enabled: false
    map_resolution_multiplier: 1
    ray_samples_multiplier: 1
    max_depth_add: 0

scene:
  type: file  # builtin | file | procedural
  builtin: null
  file: scenes/anechoic_chamber_nofoam/scene.xml
  mesh: null
  proxy_enabled: false
  export_mesh: true
  procedural:
    preset: null
    ground:
      size: [10.0, 10.0]
      elevation: 0.0
      material: concrete
    boxes: []
  proxy:
    ground:
      size: [12.0, 12.0]
      elevation: 0.0
    boxes: []
  tx:
    name: tx
    position: [0.0, -0.98, 1.5]
    look_at: [0.0, 0.0, 1.5]
    power_dbm: 44.0
  rx:
    name: rx
    position: [0.0, 0.98, 1.5]
  camera:
    position: [4.0, 4.0, 3.4]
    orientation: [0.0, 1.5708, -1.5708]
  arrays:
    tx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
    rx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
  objects: []

radio_map:
  enabled: true
  auto_size: true
  auto_padding: 0.2
  center: [0.0, 0.0, 1.5]
  orientation: [0.0, 0.0, 0.0]
  size: [2.2, 2.2]
  cell_size: [0.05, 0.05]
  batch_size: 512
  samples_per_tx: 2000000
  max_depth: 5
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: true
  diffraction: false

render:
  enabled: true
  samples: 128
  resolution: [1200, 900]

visualization:
  ray_paths:
    enabled: true
    max_paths: 100

quality:
  preset: high

ris:
  enabled: false
  notes: "Placeholder for future RIS integration"

output:
  base_dir: outputs
