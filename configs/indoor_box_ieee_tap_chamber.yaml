project:
  name: RIS_SIONNA
  description: "28 GHz IEEE TAP near-field RIS chamber baseline"

runtime:
  prefer_gpu: true
  force_cpu: false
  require_cuda: true
  tensorflow_import: auto
  disable_pythreejs: true
  mitsuba_variant: auto
  vram_guard:
    threshold_mb: 9000
    scale: 0.5

simulation:
  frequency_hz: 28.0e9
  max_depth: 6
  max_num_paths_per_src: 2000000
  samples_per_src: 2000000
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: false
  diffraction: false
  ris: true
  ris_off_amplitude: 0.9
  scale_similarity:
    enabled: false
    factor: 1.0
  sampling_boost:
    enabled: false
    map_resolution_multiplier: 1
    ray_samples_multiplier: 1
    max_depth_add: 0

scene:
  type: file
  builtin: null
  file: scenes/anechoic_chamber_foam_ideal/scene.xml
  mesh: null
  custom_radio_materials:
    itu_absorber:
      relative_permittivity: 1.0
      conductivity: 0.0
      scattering_coefficient: 0.0
      xpd_coefficient: 0.0
  proxy_enabled: false
  export_mesh: true
  procedural:
    preset: null
    ground:
      size: [10.0, 10.0]
      elevation: 0.0
      material: concrete
    boxes: []
  proxy:
    ground:
      size: [12.0, 12.0]
      elevation: 0.0
    boxes: []
  tx:
    name: tx
    position: [-0.2, 0.9536, 1.5]
    look_at: [0.0, 1.3, 1.5]
    power_dbm: 28.0
  rx:
    name: rx
    position: [0.0, 0.20455488498966785, 1.6]
  camera:
    position: [4.0, 4.0, 3.4]
    orientation: [0.0, 1.5708, -1.5708]
  arrays:
    tx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: horn_15dbi_front
      polarization: V
    rx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: horn_22dbi_front
      polarization: V
  objects: []

radio_map:
  enabled: true
  auto_size: true
  auto_padding: 0.2
  center: [0.0, 0.0, 1.55]
  orientation: [0.0, 0.0, 0.0]
  size: [2.2, 2.2]
  cell_size: [0.05, 0.05]
  z_stack:
    enabled: true
    num_below: 3
    num_above: 3
    spacing_m: 0.05
  batch_size: 512
  samples_per_tx: 2000000
  max_depth: 5
  los: true
  specular_reflection: true
  diffuse_reflection: true
  refraction: true
  diffraction: false
  ris: true
  ris_off_map: true
  ris_off_amplitude: 0.9
  plot_show_ris: true
  tx_ris_incidence:
    enabled: true
    length_padding_m: 0.15
    vertical_padding_m: 0.5

render:
  enabled: true
  samples: 128
  resolution: [1200, 900]

visualization:
  ray_paths:
    enabled: true
    max_paths: 100

quality:
  preset: high

ris:
  enabled: true
  geometry_mode: size_driven
  size:
    width_m: 0.0926
    height_m: 0.0926
    target_dx_m: 0.0049
    target_dy_m: 0.0049
  objects:
    - name: ris1
      position: [0.0, 1.3, 1.5]
      orientation: [4.712389, 0.0, 0.0]
      num_modes: 1
      profile:
        kind: phase_gradient_reflector
        auto_aim: true
        amplitude: 0.84

campaign:
  sweep_device: rx
  radius_m: 1.1
  arc_height_offset_m: 0.0
  start_angle_deg: -90.0
  stop_angle_deg: 90.0
  step_deg: 2.0
  max_angles_per_job: 12
  pivot: [0.0, 1.3, 1.5]
  compact_output: false
  disable_render: true
  prune_angle_outputs: false
  coarse_cell_size_m: 0.1

experiment:
  reference: "IEEE TAP RIS near-field chamber setup"
  tx_ris_distance_m: 0.4
  rx_ris_distance_m: 1.1
  tx_incidence_azimuth_deg: -30.0
  tx_gain_dbi: 15.0
  rx_gain_dbi: 22.0
  tx_power_dbm: 28.0
  notes:
    - "Tx power uses Table I (28 dBm); the near-field chamber section states geometry and horn gains but not a separate transmit level."
    - "Indoor chamber preset uses front-only approximate 15 dBi Tx and 22 dBi Rx horns so rays do not launch behind the horn aperture in the showcase viewer."
    - "Sionna chamber preset keeps continuous phase control; hardware 1-bit quantization is treated as part of the real-device comparison, not baked into the RT baseline."
    - "For visualization, the default horizontal radio-map slice is lifted to z=1.55 m and the fixed Rx is lifted to z=1.6 m so the slice intersects the reflected energy more reliably."

output:
  base_dir: outputs
