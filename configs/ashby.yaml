project:
  name: RIS_SIONNA
  description: Ashby 300x300 ground-only scene
runtime:
  prefer_gpu: true
  force_cpu: false
  tensorflow_import: auto
  disable_pythreejs: true
  mitsuba_variant: auto
  vram_guard:
    threshold_mb: 9000
    scale: 0.5
simulation:
  frequency_hz: 28.0e9
  max_depth: 4
  max_num_paths_per_src: 200000
  samples_per_src: 200000
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
  scale_similarity:
    enabled: false
    factor: 1.0
  sampling_boost:
    enabled: false
    map_resolution_multiplier: 1
    ray_samples_multiplier: 1
    max_depth_add: 0
scene:
  type: file
  file: scenes/ashby/scene.xml
  mesh: null
  proxy_enabled: false
  export_mesh: true
  tx:
    name: tx
    position:
    - 0.0
    - -100.0
    - 30.0
    look_at:
    - 0.0
    - 0.0
    - 5.0
    power_dbm: 44.0
  rx:
    name: rx
    position:
    - 0.0
    - 100.0
    - 1.5
  camera:
    position:
    - 500.0
    - 500.0
    - 500.0
    orientation:
    - 0.0
    - 1.5708
    - -1.5708
  arrays:
    tx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
    rx:
      num_rows: 1
      num_cols: 1
      vertical_spacing: 0.5
      horizontal_spacing: 0.5
      pattern: iso
      polarization: V
radio_map:
  enabled: true
  auto_size: true
  auto_padding: 10.0
  center:
  - 0.0
  - 0.0
  - 1.5
  orientation:
  - 0.0
  - 0.0
  - 0.0
  size:
  - 200.0
  - 200.0
  cell_size:
  - 4.0
  - 4.0
  batch_size: 256
  samples_per_tx: 80000
  max_depth: 2
  los: true
  specular_reflection: true
  diffuse_reflection: false
  refraction: false
  diffraction: false
render:
  enabled: true
  samples: 64
  resolution:
  - 800
  - 600
visualization:
  ray_paths:
    enabled: true
    max_paths: 800
quality:
  preset: preview
ris:
  enabled: false
output:
  base_dir: outputs
